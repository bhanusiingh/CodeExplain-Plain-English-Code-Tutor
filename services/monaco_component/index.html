<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  #editor-container {
    width: 100%;
    height: 100vh;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #30363d;
  }
</style>
</head>
<body>
<div id="editor-container"></div>

<!-- Monaco Editor from official Microsoft CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
(function() {
  let editor = null;
  let currentVal = "";
  let isReady = false;
  let readOnly = false;

  // Helper to normalize line endings to prevent Windows vs Unix loop reruns
  function normalizeLineEndings(str) {
    if (!str) return "";
    return str.replace(/\r\n/g, "\n");
  }

  // Streamlit Component API simulation using raw postMessage
  const Streamlit = {
    setComponentReady: function() {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:componentReady",
        apiVersion: 1
      }, "*");
    },
    setComponentValue: function(value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: value
      }, "*");
    },
    setFrameHeight: function(height) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: height
      }, "*");
    }
  };

  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

  require(['vs/editor/editor.main'], function() {
    // Define a custom dark theme matching the CodeExplain palette
    monaco.editor.defineTheme('codeexplain-dark', {
      base:    'vs-dark',
      inherit: true,
      rules:   [],
      colors:  {
        'editor.background':           '#090d13',
        'editor.foreground':           '#e6edf3',
        'editor.lineHighlightBackground': '#161b22',
        'editor.selectionBackground':  '#264f78',
        'editorLineNumber.foreground': '#484f58',
        'editorLineNumber.activeForeground': '#8b949e',
        'editor.inactiveSelectionBackground': '#1e2c3a',
        'editorIndentGuide.background': '#21262d',
        'editorIndentGuide.activeBackground': '#30363d',
        'scrollbarSlider.background': '#30363daa',
        'scrollbarSlider.hoverBackground': '#484f58aa',
        'editorBracketMatch.background': '#1a3a52',
        'editorBracketMatch.border': '#58a6ff',
      }
    });

    // Create the Monaco editor instance
    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value:              "",
      language:           "plaintext",
      theme:              'codeexplain-dark',
      readOnly:           false,

      // Features
      lineNumbers:        'on',
      renderLineHighlight:'line',
      wordWrap:           'on',
      automaticLayout:    true,
      folding:            true,
      scrollBeyondLastLine: false,
      minimap:            { enabled: false },

      // Indentation & brackets
      autoIndent:         'full',
      tabSize:            4,
      insertSpaces:       true,
      matchBrackets:      'always',
      autoClosingBrackets:'always',
      autoClosingQuotes:  'always',

      // Font
      fontFamily:         "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
      fontSize:           14,
      lineHeight:         22,

      // UX
      cursorBlinking:     'smooth',
      smoothScrolling:    true,
      padding:            { top: 12, bottom: 12 },
      contextmenu:        true,
      scrollbar:          { useShadows: false },
    });

    // Notify Streamlit that the component is ready to render
    isReady = true;
    Streamlit.setComponentReady();

    // Debounced value sync to prevent typing lag
    let syncTimer = null;
    function syncValue(immediate = false) {
      if (!editor) return;
      // Do not sync or trigger reruns if the editor is read-only (during processing)
      if (readOnly) return;

      const val = normalizeLineEndings(editor.getValue());
      const normalizedCurrent = normalizeLineEndings(currentVal);

      if (val !== normalizedCurrent) {
        currentVal = val;
        if (immediate) {
          clearTimeout(syncTimer);
          Streamlit.setComponentValue(currentVal);
        } else {
          clearTimeout(syncTimer);
          syncTimer = setTimeout(() => {
            Streamlit.setComponentValue(currentVal);
          }, 300); // 300ms debounce
        }
      }
    }

    editor.onDidChangeModelContent(() => syncValue(false));
    editor.onDidBlurEditorText(() => syncValue(true));
  });

  // Maps CodeExplain language names to Monaco language identifiers
  const MONACO_LANGUAGE_MAP = {
    "Python":     "python",
    "Java":       "java",
    "JavaScript": "javascript",
    "C++":        "cpp",
    "C":          "c",
    "Plain Text": "plaintext",
  };

  // Receive render updates from Streamlit
  window.addEventListener("message", (event) => {
    if (event.data.type === "streamlit:render") {
      const args = event.data.args;
      if (!args || !isReady || !editor) return;

      const { value, language, disabled, height } = args;

      // Update frame height
      if (height) {
        Streamlit.setFrameHeight(height);
      }

      // Update readOnly status
      if (disabled !== undefined) {
        readOnly = disabled;
        editor.updateOptions({ readOnly: disabled });
      }

      // Update language
      if (language) {
        const monacoLang = MONACO_LANGUAGE_MAP[language] || "plaintext";
        const currentModel = editor.getModel();
        if (currentModel) {
          const currentLang = currentModel.getLanguageId();
          if (currentLang !== monacoLang) {
            monaco.editor.setModelLanguage(currentModel, monacoLang);
          }
        }
      }

      // Update content if changed externally (e.g. upload, clear, history restore)
      const normalizedIncoming = normalizeLineEndings(value);
      const normalizedCurrent = normalizeLineEndings(editor.getValue());
      if (value !== undefined && normalizedIncoming !== normalizedCurrent) {
        currentVal = value;
        editor.setValue(value);
      }
    }
  });
})();
</script>
</body>
</html>
